# Blueprint de Render para el PANEL ADMINISTRATIVO + la base Postgres COMPARTIDA.
# El panel es la fuente de verdad y "dueño" de la base. La tienda (web-tienda)
# se conecta a ESTA misma base (ver web-tienda/render.yaml + DEPLOY.md).

databases:
  - name: miami-import-db
    databaseName: miami_import
    user: miami_import
    plan: free            # subí a 'starter' para producción real

services:
  - type: web
    name: miami-panel
    runtime: python
    plan: free
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT --no-server-header --proxy-headers --forwarded-allow-ips='*'
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.7"
      - key: DATABASE_URL
        fromDatabase:
          name: miami-import-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      # Clave de firma del panel: DISTINTA de la tienda (generada aparte).
      - key: ADMIN_SECRET_KEY
        generateValue: true
      - key: DEV_MODE
        value: "false"
      - key: COOKIE_SECURE
        value: "true"
      # Completar en el dashboard (Environment > Secret):
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: USD_TO_ARS_RATE
        value: "1410"
      - key: STORE_BASE_URL
        sync: false        # https://miami-tienda.onrender.com (o tu dominio)
      - key: PANEL_BASE_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false
