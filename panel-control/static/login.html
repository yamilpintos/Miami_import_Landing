<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<meta name="robots" content="noindex,nofollow"/>
<title>Ingresar · MIAMI_IMPORT</title>
<style>
  :root { --gold:#b99b63; --gold-soft:#d4bb88; --ink:#f5f3ee; --ink-mute:#8a8578; }
  * { box-sizing:border-box; }
  body {
    margin:0; min-height:100vh; display:flex; align-items:center; justify-content:center;
    background:#050505; color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background-image:
      radial-gradient(ellipse 60% 40% at 50% 25%, rgba(185,155,99,.14) 0%, transparent 60%),
      radial-gradient(circle at 50% 50%, rgba(185,155,99,.05) 1px, transparent 1.8px);
    background-size:auto, 30px 30px;
  }
  .card {
    width:min(92vw,380px); padding:40px 34px;
    background:rgba(18,18,18,.92); border:1px solid rgba(185,155,99,.22);
    border-radius:14px; box-shadow:0 24px 60px rgba(0,0,0,.55);
    backdrop-filter:blur(6px);
  }
  .brand-mark {
    font-weight:800; letter-spacing:2px; font-size:13px; color:var(--gold);
    text-align:center; margin-bottom:4px;
  }
  h1 { font-size:20px; font-weight:600; text-align:center; margin:0 0 26px; }
  label { display:block; font-size:12px; color:var(--ink-mute); margin:14px 0 6px; text-transform:uppercase; letter-spacing:.5px; }
  input {
    width:100%; padding:12px 14px; border-radius:9px; font-size:15px;
    background:#0d0d0d; border:1px solid rgba(255,255,255,.1); color:var(--ink); outline:none;
  }
  input:focus { border-color:var(--gold); }
  button {
    margin-top:24px; width:100%; padding:13px; border:0; border-radius:9px; cursor:pointer;
    font-size:15px; font-weight:600; color:#0a0a0a;
    background:linear-gradient(90deg,var(--gold),var(--gold-soft));
  }
  button:disabled { opacity:.6; cursor:default; }
  .err { margin-top:16px; min-height:18px; font-size:13px; color:#ff7a7a; text-align:center; }
</style>
</head>
<body>
  <form class="card" id="login-form">
    <div class="brand-mark">M / I</div>
    <h1>Panel de control</h1>
    <label for="email">Email</label>
    <input id="email" type="email" autocomplete="username" required autofocus/>
    <label for="password">Contraseña</label>
    <input id="password" type="password" autocomplete="current-password" required/>
    <div id="mfa-wrap" hidden>
      <label for="totp_code">Código de verificación</label>
      <input id="totp_code" type="text" inputmode="numeric" autocomplete="one-time-code"
             pattern="[0-9]*" maxlength="6" placeholder="6 dígitos"/>
    </div>
    <button id="submit" type="submit">Ingresar</button>
    <div class="err" id="err"></div>
  </form>
<script src="/static/js/login.js"></script>
</body>
</html>
