{% extends "base.html" %}
{% block title %}Restablecer contraseña — {{ STORE_NAME }}{% endblock %}

{% block content %}
<div class="mi-container" style="max-width:420px;padding:60px 24px;min-height:60vh">
  <h1 style="font-size:24px;text-align:center;margin-bottom:24px">Nueva contraseña</h1>
  <form id="form-reset" class="mi-form">
    <input type="hidden" name="token" value="{{ reset_token }}"/>
    <label>Contraseña nueva (mín. 8)</label>
    <input type="password" name="password" required minlength="8" autocomplete="new-password"/>
    <button type="submit">Guardar contraseña</button>
    <div class="mi-form-msg" style="text-align:center;margin-top:14px"></div>
  </form>
</div>
<style>
  .mi-form label{display:block;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:rgba(245,243,238,.55);margin:12px 0 6px}
  .mi-form input{width:100%;padding:12px 14px;background:#0d0d0d;border:1px solid rgba(255,255,255,.12);color:#fff;border-radius:8px;outline:none}
  .mi-form button{margin-top:20px;width:100%;padding:14px;border:0;border-radius:999px;background:var(--miami-gold,#b99b63);color:#0a0a0a;font-weight:700;letter-spacing:.15em;text-transform:uppercase;font-size:13px;cursor:pointer}
  .mi-form-msg{font-size:13px;color:#ff8a8a}.mi-form-msg.ok{color:var(--miami-gold,#b99b63)}
</style>
{% endblock %}
{% block scripts %}
<script>
  const f=document.getElementById('form-reset');
  f.addEventListener('submit',async e=>{
    e.preventDefault(); const msg=f.querySelector('.mi-form-msg'); msg.className='mi-form-msg';
    const r=await fetch('/api/account/password/reset',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({token:f.token.value,password:f.password.value})});
    const d=await r.json();
    if(r.ok){ msg.className='mi-form-msg ok'; msg.textContent='✓ Listo. Redirigiendo…'; setTimeout(()=>location.href='/cuenta/ingresar',1500); }
    else msg.textContent=d.detail||'Token inválido';
  });
</script>
{% endblock %}
