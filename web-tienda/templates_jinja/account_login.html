{% extends "base.html" %}
{% block title %}Ingresar — {{ STORE_NAME }}{% endblock %}

{% block content %}
<div class="mi-container" style="max-width:480px;padding:60px 24px;min-height:60vh">
  <div style="display:flex;gap:8px;margin-bottom:28px;justify-content:center">
    <button class="mi-tab" data-tab="login" style="background:none;border:0;color:var(--miami-gold,#b99b63);font-size:13px;letter-spacing:.18em;text-transform:uppercase;cursor:pointer;padding:8px 14px;border-bottom:2px solid var(--miami-gold,#b99b63)">Ingresar</button>
    <button class="mi-tab" data-tab="register" style="background:none;border:0;color:rgba(245,243,238,.5);font-size:13px;letter-spacing:.18em;text-transform:uppercase;cursor:pointer;padding:8px 14px;border-bottom:2px solid transparent">Crear cuenta</button>
  </div>

  {% if google_enabled %}
  <a href="/auth/google/login" style="display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:13px;
    background:#fff;color:#0a0a0a;border-radius:8px;font-weight:600;font-size:14px;margin-bottom:20px">
    <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.5 0 6.6 1.2 9.1 3.6l6.8-6.8C35.9 2.4 30.3 0 24 0 14.6 0 6.4 5.4 2.5 13.3l7.9 6.1C12.3 13.2 17.6 9.5 24 9.5z"/><path fill="#4285F4" d="M46.5 24.5c0-1.6-.1-3.1-.4-4.5H24v9h12.7c-.6 3-2.3 5.5-4.8 7.2l7.4 5.7C43.9 38 46.5 31.8 46.5 24.5z"/><path fill="#FBBC05" d="M10.4 28.6c-.5-1.5-.8-3-.8-4.6s.3-3.1.8-4.6l-7.9-6.1C.9 16.5 0 20.1 0 24s.9 7.5 2.5 10.7l7.9-6.1z"/><path fill="#34A853" d="M24 48c6.3 0 11.6-2.1 15.5-5.6l-7.4-5.7c-2.1 1.4-4.8 2.3-8.1 2.3-6.4 0-11.7-3.7-13.6-9.4l-7.9 6.1C6.4 42.6 14.6 48 24 48z"/></svg>
    Continuar con Google</a>
  <div style="text-align:center;color:rgba(245,243,238,.3);font-size:12px;margin-bottom:20px">o con tu email</div>
  {% endif %}

  {# ---- LOGIN ---- #}
  <form id="form-login" class="mi-auth-form">
    <label>Email</label><input type="email" name="email" required autocomplete="email"/>
    <label>Contraseña</label><input type="password" name="password" required autocomplete="current-password"/>
    <button type="submit">Ingresar</button>
    <a href="#" id="forgot-link" style="display:block;text-align:center;margin-top:14px;color:rgba(245,243,238,.5);font-size:13px">¿Olvidaste tu contraseña?</a>
    <div class="mi-auth-msg"></div>
  </form>

  {# ---- REGISTER ---- #}
  <form id="form-register" class="mi-auth-form" style="display:none">
    <label>Nombre</label><input type="text" name="full_name" autocomplete="name"/>
    <label>Email</label><input type="email" name="email" required autocomplete="email"/>
    <label>Teléfono (opcional)</label><input type="tel" name="phone" autocomplete="tel"/>
    <label>Contraseña</label><input type="password" name="password" required minlength="8" autocomplete="new-password"/>
    <button type="submit">Crear cuenta</button>
    <div class="mi-auth-msg"></div>
  </form>
</div>

<style>
  .mi-auth-form label{display:block;font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:rgba(245,243,238,.6);margin:16px 0 6px}
  .mi-auth-form input{width:100%;padding:12px 14px;background:#0d0d0d;border:1px solid rgba(255,255,255,.12);color:#fff;border-radius:8px;outline:none;font-size:15px}
  .mi-auth-form input:focus{border-color:var(--miami-gold,#b99b63)}
  .mi-auth-form button[type=submit]{margin-top:24px;width:100%;padding:14px;border:0;border-radius:999px;background:var(--miami-gold,#b99b63);color:#0a0a0a;font-weight:700;letter-spacing:.15em;text-transform:uppercase;font-size:13px;cursor:pointer}
  .mi-auth-msg{min-height:18px;margin-top:14px;text-align:center;font-size:13px;color:#ff8a8a}
  .mi-auth-msg.ok{color:var(--miami-gold,#b99b63)}
</style>
{% endblock %}

{% block scripts %}
<script>
  const tabs=document.querySelectorAll('.mi-tab'), fl=document.getElementById('form-login'), fr=document.getElementById('form-register');
  tabs.forEach(t=>t.addEventListener('click',()=>{
    tabs.forEach(x=>{x.style.color='rgba(245,243,238,.5)';x.style.borderBottomColor='transparent';});
    t.style.color='var(--miami-gold,#b99b63)';t.style.borderBottomColor='var(--miami-gold,#b99b63)';
    const isLogin=t.dataset.tab==='login'; fl.style.display=isLogin?'block':'none'; fr.style.display=isLogin?'none':'block';
  }));
  async function submit(form, url){
    const msg=form.querySelector('.mi-auth-msg'); msg.className='mi-auth-msg'; msg.textContent='';
    const body=Object.fromEntries(new FormData(form).entries());
    const btn=form.querySelector('button[type=submit]'); btn.disabled=true;
    try{
      const r=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
      const data=await r.json(); if(!r.ok) throw new Error(data.detail||'Error');
      window.location.href='/cuenta';
    }catch(e){ msg.textContent=e.message; btn.disabled=false; }
  }
  fl.addEventListener('submit',e=>{e.preventDefault();submit(fl,'/api/account/login');});
  fr.addEventListener('submit',e=>{e.preventDefault();submit(fr,'/api/account/register');});
  document.getElementById('forgot-link').addEventListener('click',async e=>{
    e.preventDefault(); const msg=fl.querySelector('.mi-auth-msg'); msg.className='mi-auth-msg ok';
    const email=fl.querySelector('[name=email]').value;
    if(!email){msg.className='mi-auth-msg';msg.textContent='Escribí tu email arriba primero.';return;}
    const r=await fetch('/api/account/password/forgot',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email})});
    const d=await r.json();
    msg.textContent = d.dev_reset_link ? ('Link (dev): '+d.dev_reset_link) : 'Si el email existe, te enviamos un enlace para resetear.';
  });
</script>
{% endblock %}
